<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Support IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0F3B2C 0%, #1A4A38 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            margin: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { font-size: 28px; color: #0F3B2C; margin-bottom: 16px; }
        p { color: #2D5A4A; line-height: 1.6; margin-bottom: 24px; }
        .icon { font-size: 64px; margin-bottom: 16px; }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #C9A87C 0%, #B8965A 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🤖</div>
        <h1>Support IA</h1>
        <p>Bienvenue sur notre plateforme de support intelligent.<br>Posez vos questions, notre équipe est là pour vous répondre.</p>
        <div class="badge">💬 Chat en ligne</div>
    </div>
    <script src="/static/simple-widget.js"></script>
    <script>
        window.ChatWidget.init({
            apiKey: "31d4efff-2b32-481f-a17f-d2017982f7ed",
            appName: "Support IA",
            theme: "light"
        });
    </script>
</body>
</html>
