<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Support IA - Mon espace</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #F7F7F8;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        body.dark {
            background: #1E1E1E;
        }

        body.dark .app-container {
            background: #1E1E1E;
        }

        body.dark .app-header {
            background: #2A2A2A;
            border-bottom-color: #3A3A3A;
        }

        body.dark .logo-text h2 {
            color: #EDEDED;
        }

        body.dark .logo-text p {
            color: #A0A0A0;
        }

        body.dark .greeting {
            color: #EDEDED;
        }

        body.dark .sidebar {
            background: #2A2A2A;
            border-right-color: #3A3A3A;
        }

        body.dark .conv-item:hover {
            background: #3A3A3A;
        }

        body.dark .conv-item.active {
            background: #3A3A3A;
        }

        body.dark .conv-title {
            color: #EDEDED;
        }

        body.dark .search-box input {
            background: #3A3A3A;
            border-color: #4A4A4A;
            color: #EDEDED;
        }

        body.dark .messages-container {
            background: #1E1E1E;
        }

        body.dark .message.bot .message-bubble {
            background: #2A2A2A;
            color: #EDEDED;
            border-color: #3A3A3A;
        }

        body.dark .input-area {
            background: #2A2A2A;
            border-top-color: #3A3A3A;
        }

        body.dark .input-area textarea {
            background: #3A3A3A;
            border-color: #4A4A4A;
            color: #EDEDED;
        }

        body.dark .welcome-message h3 {
            color: #EDEDED;
        }

        body.dark .welcome-message p {
            color: #A0A0A0;
        }

        body.dark .sidebar-footer {
            border-top-color: #3A3A3A;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            transition: background 0.3s ease;
        }

        .app-header {
            background: white;
            border-bottom: 1px solid #E8E0D5;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            position: relative;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #0F3B2C;
        }

        body.dark .menu-toggle {
            color: #EDEDED;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: #0F3B2C;
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 11px;
            color: #2D5A4A;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .greeting {
            font-weight: 500;
            font-size: 14px;
            color: #0F3B2C;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: #E8E0D5;
            transform: scale(1.05);
        }

        body.dark .theme-toggle:hover {
            background: #3A3A3A;
        }

        .logout-header-btn {
            background: linear-gradient(135deg, #0F3B2C 0%, #2D5A4A 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 12px;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #E8E0D5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #E8E0D5;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #C9A87C 0%, #B8965A 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(201,168,124,0.3);
        }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid #E8E0D5;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #E8E0D5;
            border-radius: 30px;
            font-size: 13px;
            background: #F9F7F3;
            transition: all 0.3s ease;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conv-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .conv-item:hover {
            background: #F5F0E8;
        }

        .conv-item.active {
            background: #F5F0E8;
            border-left: 3px solid #C9A87C;
        }

        .conv-title {
            font-size: 13px;
            font-weight: 500;
            color: #0F3B2C;
            margin-bottom: 4px;
        }

        .conv-preview {
            font-size: 11px;
            color: #6B7B6F;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-date {
            font-size: 10px;
            color: #9AB3A5;
            margin-top: 4px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #E8E0D5;
            margin-top: auto;
        }

        .logout-sidebar-btn {
            width: 100%;
            padding: 10px;
            background: #E07A5F;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .logout-sidebar-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(224,122,95,0.3);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #F7F7F8;
            transition: background 0.3s ease;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .welcome-message {
            text-align: center;
            margin-top: 60px;
            color: #9AB3A5;
        }

        .welcome-message .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome-message h3 {
            color: #0F3B2C;
            font-family: 'Playfair Display', serif;
            margin-bottom: 8px;
        }

        .message {
            display: flex;
            margin-bottom: 20px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #C9A87C 0%, #B8965A 100%);
            color: white;
        }

        .message.bot .message-bubble {
            background: white;
            color: #1F1F1F;
            border: 1px solid #E8E0D5;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message-bubble:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 4px;
            border-radius: 4px;
            color: #888;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: #555;
            transform: scale(1.05);
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid #E8E0D5;
            background: white;
            transition: all 0.3s ease;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .attach-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            color: #888;
        }

        .attach-btn:hover {
            background: #F0F0F0;
            transform: scale(1.05);
        }

        body.dark .attach-btn:hover {
            background: #3A3A3A;
        }

        .input-area textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #E8E0D5;
            border-radius: 24px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            resize: none;
            background: #F9F7F3;
            max-height: 100px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .send-btn {
            background: linear-gradient(135deg, #C9A87C 0%, #B8965A 100%);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-1px);
        }

        .attach-menu {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            z-index: 1000;
            display: none;
        }

        body.dark .attach-menu {
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
        }

        .attach-menu.show {
            display: block;
        }

        .attach-menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }

        .attach-menu-item:hover {
            background: #F0F0F0;
        }

        body.dark .attach-menu-item:hover {
            background: #3A3A3A;
        }

        .file-input {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #C9A87C;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 1001;
            animation: fadeOut 2s ease;
        }

        .toast.error {
            background: #E07A5F;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .attached-file {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #F0F0F0;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        body.dark .attached-file {
            background: #3A3A3A;
        }

        .remove-file {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            .app-header {
                justify-content: center;
                padding: 12px 16px;
            }
            
            .menu-toggle {
                display: block;
                position: absolute;
                left: 16px;
            }
            
            .user-info {
                position: absolute;
                right: 16px;
            }
            
            .logo-area {
                justify-content: center;
            }
            
            .greeting {
                font-size: 12px;
            }
            
            .logout-header-btn {
                display: none;
            }
            
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s ease;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            
            .sidebar.open {
                left: 0;
            }
        }

        @media (min-width: 769px) {
            .logout-sidebar-btn {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <div class="logo-area">
                <div class="logo-icon">🤖✨</div>
                <div class="logo-text">
                    <h2>Support IA</h2>
                    <p>Intelligent Customer Support</p>
                </div>
            </div>
            <div class="user-info">
                <span class="greeting" id="greetingText"></span>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <button class="new-chat-btn" id="newChatBtn">+ Nouvelle discussion</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Rechercher...">
                </div>
                <div class="conversations-list" id="conversationsList">
                    <div style="text-align: center; padding: 40px; color: #9AB3A5;">
                        Aucune conversation<br>Commencez une nouvelle discussion !
                    </div>
                </div>
                <div class="sidebar-footer">
                    <a href="{% url 'login' %}" class="logout-sidebar-btn">🚪 Déconnexion</a>
                </div>
            </div>

            <div class="chat-area">
                <div class="messages-container" id="messagesContainer">
                    <div class="welcome-message">
                        <div class="icon">🤖✨</div>
                        <h3>Support IA</h3>
                        <p>Comment puis-je vous aider ?</p>
                    </div>
                </div>
                <div class="input-area">
                    <div id="attachedFileContainer"></div>
                    <div class="input-row">
                        <button class="attach-btn" id="attachBtn" title="Ajouter un fichier">+</button>
                        <textarea id="messageInput" rows="1" placeholder="Posez votre question..."></textarea>
                        <button class="send-btn" id="sendBtn">Envoyer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="attach-menu" id="attachMenu">
        <div class="attach-menu-item" id="attachDocumentBtn">📄 Upload document</div>
        <div class="attach-menu-item" id="attachPhotoBtn">📸 Prendre une photo</div>
    </div>

    <input type="file" id="fileInput" class="file-input" accept=".txt,.pdf,.png,.jpg,.jpeg">

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        const API_KEY = "31d4efff-2b32-481f-a17f-d2017982f7ed";
        
        let currentConversationId = null;
        let messages = [];
        let pollingInterval = null;
        let attachedFile = null;

        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const menuToggle = document.getElementById('menuToggle');
        const conversationsList = document.getElementById('conversationsList');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const searchInput = document.getElementById('searchInput');
        const themeToggle = document.getElementById('themeToggle');
        const attachBtn = document.getElementById('attachBtn');
        const attachMenu = document.getElementById('attachMenu');
        const attachDocumentBtn = document.getElementById('attachDocumentBtn');
        const attachPhotoBtn = document.getElementById('attachPhotoBtn');
        const fileInput = document.getElementById('fileInput');
        const attachedFileContainer = document.getElementById('attachedFileContainer');
        const greetingText = document.getElementById('greetingText');

        // Salutation selon l'heure (sans emoji dans le texte)
        function setGreeting() {
            const hour = new Date().getHours();
            let greeting = "";
            if (hour >= 5 && hour < 12) greeting = "Bonjour";
            else if (hour >= 12 && hour < 18) greeting = "Bon après-midi";
            else if (hour >= 18 && hour < 22) greeting = "Bonsoir";
            else greeting = "Bonne nuit";
            greetingText.textContent = `${greeting}, {{ user.username }}`;
        }
        setGreeting();

        // Mode sombre/clair
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️';
            } else {
                themeToggle.textContent = '🌙';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        themeToggle.onclick = toggleTheme;
        initTheme();

        // Menu burger mobile
        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        if (menuToggle) {
            menuToggle.onclick = openSidebar;
        }
        if (sidebarOverlay) {
            sidebarOverlay.onclick = closeSidebar;
        }

        window.selectConversation = async function(id) {
            currentConversationId = id;
            await loadMessages(id);
            loadConversations();
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        };

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Menu attachement
        attachBtn.onclick = (e) => {
            e.stopPropagation();
            attachMenu.classList.toggle('show');
        };

        document.addEventListener('click', () => {
            attachMenu.classList.remove('show');
        });

        // Upload document
        attachDocumentBtn.onclick = () => {
            fileInput.accept = '.txt,.pdf,.png,.jpg,.jpeg';
            fileInput.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    attachFile(e.target.files[0]);
                }
                fileInput.value = '';
            };
            fileInput.click();
            attachMenu.classList.remove('show');
        };

        attachPhotoBtn.onclick = () => {
            fileInput.accept = 'image/*';
            fileInput.capture = 'environment';
            fileInput.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    attachFile(e.target.files[0]);
                }
                fileInput.value = '';
            };
            fileInput.click();
            attachMenu.classList.remove('show');
        };

        function attachFile(file) {
            attachedFile = file;
            attachedFileContainer.innerHTML = `
                <div class="attached-file">
                    <span>📄 ${file.name}</span>
                    <button class="remove-file" onclick="removeAttachedFile()">✕</button>
                </div>
            `;
            showToast(`📎 ${file.name} attaché`);
        }

        function removeAttachedFile() {
            attachedFile = null;
            attachedFileContainer.innerHTML = '';
        }

        function uploadAttachedFile() {
            if (!attachedFile) return;
            
            const formData = new FormData();
            formData.append('api_key', API_KEY);
            formData.append('title', attachedFile.name);
            formData.append('file', attachedFile);
            
            showToast('📤 Upload du document...');
            
            fetch(`${API_BASE}/api/documents/upload/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': getCSRFToken() },
                credentials: 'include',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast(`✓ Document "${data.title}" uploadé avec succès !`);
                    removeAttachedFile();
                    addMessageToUI('bot', `📄 Le document "${data.title}" a été ajouté à la base de connaissance.`);
                    loadConversations();
                } else {
                    showToast('❌ Erreur lors de l\'upload', true);
                }
            })
            .catch(err => {
                console.error(err);
                showToast('❌ Erreur lors de l\'upload', true);
            });
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function copyMessage(text) {
            navigator.clipboard.writeText(text);
            showToast('✓ Message copié');
        }

        function editMessage(index, oldContent) {
            const newContent = prompt('Modifier votre message :', oldContent);
            if (newContent && newContent.trim() !== oldContent && newContent.trim() !== '') {
                messageInput.value = newContent;
                sendMessage();
            }
        }

        function regenerateResponse() {
            const lastUserMessage = messages.filter(m => m.role === 'user').pop();
            if (lastUserMessage) {
                messageInput.value = lastUserMessage.content;
                sendMessage();
            }
        }

        async function sendMessage() {
            let content = messageInput.value.trim();
            
            if (attachedFile) {
                uploadAttachedFile();
                setTimeout(() => {
                    if (content) {
                        sendTextMessage(content);
                    }
                }, 1500);
            } else if (content) {
                sendTextMessage(content);
            }
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }

        function getCSRFToken() {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, 10) === 'csrftoken=') {
                        cookieValue = decodeURIComponent(cookie.substring(10));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function sendTextMessage(content) {
            addMessageToUI('user', content);
            showTypingIndicator();

            try {
                const response = await fetch(`${API_BASE}/api/message/`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        api_key: API_KEY,
                        conversation_id: currentConversationId,
                        content: content
                    })
                });
                const data = await response.json();
                
                if (data.conversation_id) {
                    currentConversationId = data.conversation_id;
                }
                
                hideTypingIndicator();
                
                if (data.bot_message) {
                    addMessageToUI('bot', data.bot_message.content);
                }
                
                loadConversations();
                if (currentConversationId) {
                    loadMessages(currentConversationId);
                }
            } catch (error) {
                console.error('Erreur:', error);
                hideTypingIndicator();
                if (!error.toString().includes('403')) {
                    addMessageToUI('bot', 'Désolé, une erreur est survenue. Veuillez réessayer.');
                }
            }
        }

        function addMessageToUI(role, content, msgId = null, createdAt = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const escapedContent = escapeHtml(content);
            const time = createdAt ? new Date(createdAt).toLocaleTimeString() : new Date().toLocaleTimeString();
            
            const actionsHtml = role === 'user' ? `
                <div class="message-actions">
                    <button class="action-btn" onclick="copyMessage('${escapedContent.replace(/'/g, "\\'")}')" title="Copier">📋</button>
                    <button class="action-btn" onclick="editMessage(null, '${escapedContent.replace(/'/g, "\\'")}')" title="Modifier">✏️</button>
                </div>
            ` : `
                <div class="message-actions">
                    <button class="action-btn" onclick="copyMessage('${escapedContent.replace(/'/g, "\\'")}')" title="Copier">📋</button>
                    <button class="action-btn" onclick="regenerateResponse()" title="Régénérer">🔄</button>
                </div>
            `;
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div>${escapedContent}</div>
                    <div class="message-time">${time}</div>
                    ${actionsHtml}
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'message bot';
            indicator.innerHTML = `<div class="message-bubble">🤖 Bot est en train d'écrire...</div>`;
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function loadConversations() {
            try {
                const response = await fetch(`${API_BASE}/api/user/conversations/`, {
                    headers: { 'X-CSRFToken': getCSRFToken() },
                    credentials: 'include'
                });
                const data = await response.json();
                renderConversationsList(data);
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function renderConversationsList(conversations) {
            if (!conversationsList) return;
            
            if (conversations.length === 0) {
                conversationsList.innerHTML = '<div style="text-align: center; padding: 40px; color: #9AB3A5;">Aucune conversation<br>Commencez une nouvelle discussion !</div>';
                return;
            }
            
            conversationsList.innerHTML = conversations.map(conv => {
                let title = "Nouvelle conversation";
                const firstUserMessage = conv.messages?.find(m => m.role === 'user');
                if (firstUserMessage) {
                    title = firstUserMessage.content.substring(0, 40);
                    if (firstUserMessage.content.length > 40) title += '...';
                }
                
                return `
                    <div class="conv-item ${currentConversationId === conv.id ? 'active' : ''}" onclick="selectConversation(${conv.id})">
                        <div class="conv-title">${escapeHtml(title)}</div>
                        <div class="conv-preview">${conv.messages?.[conv.messages.length-1]?.content?.substring(0, 50) || 'Nouvelle discussion'}</div>
                        <div class="conv-date">${new Date(conv.created_at).toLocaleDateString()}</div>
                    </div>
                `;
            }).join('');
        }

        async function loadMessages(conversationId) {
            try {
                const response = await fetch(`${API_BASE}/api/conversation/${conversationId}/?api_key=${API_KEY}`, {
                    headers: { 'X-CSRFToken': getCSRFToken() },
                    credentials: 'include'
                });
                const data = await response.json();
                messages = data.messages || [];
                renderMessages();
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function renderMessages() {
            messagesContainer.innerHTML = '';
            if (messages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="welcome-message">
                        <div class="icon">🤖✨</div>
                        <h3>Support IA</h3>
                        <p>Comment puis-je vous aider ?</p>
                    </div>
                `;
                return;
            }
            
            messages.forEach(msg => {
                addMessageToUI(msg.role, msg.content, msg.id, msg.created_at);
            });
        }

        function newConversation() {
            currentConversationId = null;
            messages = [];
            renderMessages();
            loadConversations();
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        }

        if (searchInput) {
            searchInput.addEventListener('input', function() {
                const term = this.value.toLowerCase();
                const items = document.querySelectorAll('.conv-item');
                items.forEach(item => {
                    const text = item.textContent.toLowerCase();
                    item.style.display = text.includes(term) ? 'flex' : 'none';
                });
            });
        }

        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        newChatBtn.onclick = newConversation;

        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => {
                if (currentConversationId) {
                    loadMessages(currentConversationId);
                }
                loadConversations();
            }, 4000);
        }

        loadConversations();
        startPolling();
    </script>
</body>
</html>
