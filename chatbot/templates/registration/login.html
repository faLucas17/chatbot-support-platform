<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Connexion - Support IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0F3B2C 0%, #1A4A38 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .login-wrapper {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-wrap: wrap;
        }

        /* Partie gauche - Illustration */
        .login-illustration {
            flex: 1;
            background: linear-gradient(135deg, #0F3B2C 0%, #2D5A4A 100%);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-width: 260px;
        }

        .illustration-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .illustration-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: white;
            margin-bottom: 12px;
        }

        .illustration-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
            max-width: 260px;
        }

        .illustration-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            color: white;
            margin-top: 20px;
        }

        /* Partie droite - Formulaire */
        .login-form {
            flex: 1;
            padding: 32px 28px;
            background: white;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Suppression du logo et titre en trop */
        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: #0F3B2C;
            text-align: center;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #0F3B2C;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 15px;
            color: #9AB3A5;
        }

        input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            border: 1.5px solid #E8E0D5;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
            background: #F9F7F3;
        }

        input:focus {
            outline: none;
            border-color: #C9A87C;
            background: white;
            box-shadow: 0 0 0 3px rgba(201, 168, 124, 0.1);
        }

        button {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #0F3B2C 0%, #2D5A4A 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px -4px rgba(15, 59, 44, 0.35);
        }

        .forgot-link {
            text-align: center;
            margin-top: 14px;
        }

        .forgot-link a {
            font-size: 12px;
            color: #2D5A4A;
            text-decoration: none;
        }

        .forgot-link a:hover {
            color: #C9A87C;
            text-decoration: underline;
        }

        .separator {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #B0C0B5;
            font-size: 12px;
        }

        .separator::before,
        .separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #E8E0D5;
        }

        .separator span {
            padding: 0 12px;
        }

        .register-link {
            text-align: center;
            font-size: 13px;
            color: #2D5A4A;
        }

        .register-link a {
            color: #C9A87C;
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #E07A5F15;
            color: #E07A5F;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid #E07A5F30;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            
            .login-wrapper {
                flex-direction: column;
                max-width: 420px;
            }
            
            .login-illustration {
                padding: 24px 20px;
            }
            
            .illustration-icon {
                font-size: 50px;
            }
            
            .illustration-title {
                font-size: 20px;
            }
            
            .illustration-text {
                font-size: 11px;
            }
            
            .login-form {
                padding: 24px 20px;
            }
            
            .form-title {
                font-size: 24px;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 480px) {
            .login-form {
                padding: 20px 16px;
            }
            
            .form-title {
                font-size: 22px;
            }
            
            input {
                padding: 10px 12px 10px 38px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Partie gauche - Illustration -->
        <div class="login-illustration">
            <div class="illustration-icon">🤖✨</div>
            <div class="illustration-title">Support IA</div>
            <div class="illustration-text">
                Bienvenue dans votre plateforme de customer support intelligent.
            </div>
            <div class="illustration-badge">
                💬 24/7 Intelligent Support
            </div>
        </div>

        <!-- Partie droite - Formulaire (uniquement) -->
        <div class="login-form">
            <div class="form-title">Connexion</div>

            {% if form.errors %}
            <div class="error-message">
                ⚠️ Nom d'utilisateur ou mot de passe incorrect.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email ou nom d'utilisateur</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" name="username" placeholder="exemple@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit">Se connecter</button>
                <div class="forgot-link">
                    <a href="{% url 'password_reset' %}">Mot de passe oublié ?</a>
                </div>
            </form>

            <div class="separator">
                <span>ou</span>
            </div>

            <div class="register-link">
                👋 Nouveau ici ? <a href="{% url 'register' %}">Créer un compte</a>
            </div>
        </div>
    </div>
</body>
</html>
