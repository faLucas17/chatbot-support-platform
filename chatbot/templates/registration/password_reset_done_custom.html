<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Email envoyé - Support IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0F3B2C 0%, #1A4A38 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .done-wrapper {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: #0F3B2C; margin-bottom: 12px; }
        .message { font-size: 14px; color: #2D5A4A; line-height: 1.6; margin-bottom: 28px; }
        .back-link a { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #0F3B2C 0%, #2D5A4A 100%); color: white; text-decoration: none; border-radius: 40px; font-weight: 600; font-size: 14px; transition: all 0.3s; }
        .back-link a:hover { transform: translateY(-2px); box-shadow: 0 6px 14px -4px rgba(15, 59, 44, 0.35); }
        @media (max-width: 480px) {
            .done-wrapper { padding: 28px 20px; }
            h1 { font-size: 22px; }
            .icon { font-size: 50px; }
        }
    </style>
</head>
<body>
    <div class="done-wrapper">
        <div class="icon">📧✨</div>
        <h1>Email envoyé !</h1>
        <div class="message">
            Si un compte existe avec cette adresse email,<br>
            vous recevrez un lien pour réinitialiser votre mot de passe.
        </div>
        <div class="back-link">
            <a href="{% url 'login' %}">Retour à la connexion</a>
        </div>
    </div>
</body>
</html>
