<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - Support IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0F3B2C 0%, #1A4A38 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .reset-container {
            max-width: 450px;
            width: 100%;
            background: rgba(255,255,255,0.98);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #0F3B2C;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #2D5A4A;
            font-size: 14px;
            margin-bottom: 32px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E8E0D5;
            border-radius: 16px;
            font-size: 15px;
            margin-bottom: 20px;
            background: #F5F0E8;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0F3B2C 0%, #2D5A4A 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #2D5A4A;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>Mot de passe oublié</h1>
        <div class="subtitle">Entrez votre email pour réinitialiser</div>
        <form method="post">
            {% csrf_token %}
            <input type="email" name="email" placeholder="exemple@email.com" required>
            <button type="submit">Envoyer le lien</button>
        </form>
        <div class="back-link">
            <a href="{% url 'login' %}">← Retour à la connexion</a>
        </div>
    </div>
</body>
</html>
